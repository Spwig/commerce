<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="32" fill="#2563EB"/>

  <!-- Server Stack -->
  <g transform="translate(14, 16)">
    <!-- Top Server -->
    <rect x="0" y="0" width="36" height="8" rx="2" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="4" cy="4" r="1.5" fill="#10B981"/>
    <circle cx="8" cy="4" r="1.5" fill="#10B981"/>
    <rect x="12" y="2.5" width="20" height="3" rx="1" fill="#E5E7EB"/>

    <!-- Middle Server -->
    <rect x="0" y="10" width="36" height="8" rx="2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="4" cy="14" r="1.5" fill="#10B981"/>
    <circle cx="8" cy="14" r="1.5" fill="#10B981"/>
    <rect x="12" y="12.5" width="20" height="3" rx="1" fill="#E5E7EB"/>

    <!-- Bottom Server -->
    <rect x="0" y="20" width="36" height="8" rx="2" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="4" cy="24" r="1.5" fill="#10B981"/>
    <circle cx="8" cy="24" r="1.5" fill="#10B981"/>
    <rect x="12" y="22.5" width="20" height="3" rx="1" fill="#E5E7EB"/>
  </g>

  <!-- Envelope/Mail Icon (overlay) -->
  <g transform="translate(38, 38)">
    <circle cx="8" cy="8" r="11" fill="#2563EB"/>
    <circle cx="8" cy="8" r="10" fill="#FFFFFF"/>
    <path d="M3 6 L8 9.5 L13 6" stroke="#2563EB" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="3" y="5.5" width="10" height="7" rx="1" stroke="#2563EB" stroke-width="1.5" fill="none"/>
  </g>

  <!-- DKIM Shield (security badge) -->
  <g transform="translate(10, 38)">
    <circle cx="8" cy="8" r="11" fill="#2563EB"/>
    <circle cx="8" cy="8" r="10" fill="#FFFFFF"/>
    <path d="M8 3 L12 5 L12 9 C12 11.5 10 13 8 13 C6 13 4 11.5 4 9 L4 5 Z" fill="#10B981" stroke="#10B981" stroke-width="1"/>
    <path d="M7 9 L8.5 10.5 L11 7" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
