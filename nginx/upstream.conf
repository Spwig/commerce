# Upstream Configuration for Blue-Green Deployment
# This file defines which deployment (blue or green) receives traffic
#
# During a platform update, this file is swapped to point to the new deployment.
# The switch is atomic - nginx reload causes near-zero downtime (<1 second)
#
# To switch manually:
#   1. Edit this file to change the active upstream
#   2. Run: docker exec shop_nginx_1 nginx -s reload
#
# Current active deployment: BLUE

# Blue deployment upstream
upstream django_blue {
    server web_blue:8000;
    keepalive 32;
}

# Green deployment upstream (standby)
upstream django_green {
    server web_green:8000;
    keepalive 32;
}

# Active upstream - points to currently active deployment
# Change this line during blue-green switch
upstream django_app {
    server web_blue:8000;
    keepalive 32;
}
