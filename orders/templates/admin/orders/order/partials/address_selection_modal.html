{% load i18n %}

<!-- Previous Addresses Selection Modal -->
<div id="addressSelectionModal" class="admin-modal-overlay">
    <div class="admin-modal admin-modal--lg">
        <div class="admin-modal-header">
            <h2 class="admin-modal-title">
                <i class="fas fa-map-marked-alt"></i>
                {% trans "Select from Previous Addresses" %}
            </h2>
            <button type="button" class="admin-modal-close" data-action="close-addresses-modal">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="admin-modal-body">
            <div class="alert alert-info mb-4">
                <i class="fas fa-info-circle"></i>
                <span>{% trans "These are addresses from this customer's previous orders. Select one to use for shipping, billing, both or cancel to enter details manually." %}</span>
            </div>

            <div id="previousAddressesList" class="previous-addresses-grid">
                <!-- Addresses will be dynamically inserted here -->
            </div>

            <div id="noPreviousAddresses" class="d-none text-center py-5 text-gray-500">
                <i class="fas fa-inbox fa-3x mb-3"></i>
                <p>{% trans "No previous addresses found for this customer." %}</p>
            </div>
        </div>

        <div class="admin-modal-footer">
            <button type="button" class="btn btn-secondary" data-action="close-addresses-modal">
                <i class="fas fa-times"></i>
                {% trans "Cancel" %}
            </button>
        </div>
    </div>
</div>
