name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit in the PR
        run: |
          echo "Checking commits ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git log --format=%H ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}); do
            if ! git log -1 --format=%B "$sha" | grep -qE "^Signed-off-by: .+ <.+@.+>"; then
              echo "::error::Commit $sha is missing Signed-off-by. Run: git commit --amend --signoff"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "See CONTRIBUTING.md § Developer Certificate of Origin for details."
            exit 1
          fi
          echo "All commits carry a Signed-off-by line ✓"
