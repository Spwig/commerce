name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan on the main branch even without new commits
    - cron: "0 6 * * 1"

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks/gitleaks-action@v2 requires a paid GITLEAKS_LICENSE for
      # organization accounts. Invoke the binary directly instead —
      # gitleaks itself is fully open source. Config comes from
      # .gitleaks.toml at the repo root (documented placeholder
      # allowlists).
      - name: Install gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks detect
        run: gitleaks detect --config .gitleaks.toml --verbose

  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit
        # Report but don't fail — dependency advisories are noisy and often
        # unactionable within days of publication. We surface them to the
        # PR checks but merges aren't blocked.
        run: pip-audit -r requirements.txt || true

  npm-audit:
    name: npm audit (JS deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: audit
        run: npm audit --audit-level=high || true
