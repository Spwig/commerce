name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: spwig
          POSTGRES_PASSWORD: spwig
          POSTGRES_DB: spwig_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spwig"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests (community edition + integration sandbox)
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: spwig_test
          DB_USER: spwig
          DB_PASSWORD: spwig
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SECRET_KEY: ci-test-secret-key-not-for-production
          SPWIG_TELEMETRY: "0"
        run: |
          pytest tests/community_edition/ tests/integration/test_sandbox.py -v
