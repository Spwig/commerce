name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector/pgvector image = postgres 16 + pgvector extension
        # pre-installed. core/models.py uses pgvector.django.VectorField
        # for semantic-search embeddings, so migrations `CREATE EXTENSION
        # vector` on first apply. The plain postgres:16 image doesn't
        # have the .so, and migrations fail before any test runs.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: spwig
          POSTGRES_PASSWORD: spwig
          POSTGRES_DB: spwig_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spwig"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Django tests (community edition + integration sandbox)
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: spwig_test
          DB_USER: spwig
          DB_PASSWORD: spwig
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SECRET_KEY: ci-test-secret-key-not-for-production
          # Test-only Fernet key. Email / SMS provider credential fields
          # get symmetrically encrypted at rest — no default in settings
          # means every send-service test fails at credential-write.
          # Rotate freely; not tied to any real data.
          EMAIL_ENCRYPTION_KEY: "wFUuMXZIwn5s2SAAi1hd4b9Jl0cAzyHl8Z7_fNZKeHk="
          SPWIG_TELEMETRY: "0"
        run: |
          pytest tests/community_edition/ tests/integration/test_sandbox.py -v

      - name: Run Django tests (app-level suites — audited drift-recovery scope)
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: spwig_test
          DB_USER: spwig
          DB_PASSWORD: spwig
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SECRET_KEY: ci-test-secret-key-not-for-production
          EMAIL_ENCRYPTION_KEY: "wFUuMXZIwn5s2SAAi1hd4b9Jl0cAzyHl8Z7_fNZKeHk="
          SPWIG_TELEMETRY: "0"
        # Explicit paths: pytest.ini has `testpaths = tests`, so bare
        # `pytest` skips these dirs. Guards the ~4,400 tests audited
        # in the drift-recovery campaign (Phases 1 + 4 + 5 of
        # docs/.claude_code/plans/test-suite-drift-recovery.md).
        # New drift in any of these paths will now turn CI red.
        run: |
          pytest --create-db -v \
            tests/unit/ \
            tests/integration/ \
            tests/contract/ \
            tests/catalog/ \
            tests/rbac/ \
            tests/integrity/ \
            accounts/tests/ \
            admin_api/tests/ \
            catalog/tests/ \
            design/tests/ \
            email_system/tests/ \
            loyalty/tests/ \
            migration/tests/ \
            orders/tests/ \
            referrals/tests/ \
            search/tests/ \
            shipping/tests/ \
            social_sharing/tests/ \
            subscriptions/tests/
