# .github/ISSUE_TEMPLATE/config.yml
#
# Turns off the "blank issue" option so every new issue comes from one
# of the templates or from an appropriate contact link.

blank_issues_enabled: false

contact_links:
  - name: Community Discussions
    url: https://github.com/Spwig/commerce/discussions
    about: >-
      Questions, ideas, and show-and-tell. Please post there instead
      of opening an issue — it's easier for others to find later.

  - name: Community forum
    url: https://community.spwig.com
    about: >-
      Long-form threads, best-practice recipes, and extension
      showcases. Great for topics that grow over time.

  - name: Documentation
    url: https://docs.spwig.com
    about: >-
      Merchant docs, admin how-to, provider setup guides.

  - name: Security disclosure
    url: https://github.com/Spwig/commerce/blob/main/SECURITY.md
    about: >-
      Report a vulnerability privately per SECURITY.md — do NOT
      open a public issue for security problems.

  - name: Commercial support
    url: https://spwig.com/en/support
    about: >-
      Priority support is available for Pro and Enterprise licences.
