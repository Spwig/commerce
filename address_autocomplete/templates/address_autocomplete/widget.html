<!-- Address Autocomplete Widget Template -->
{% if enabled %}
<div class="address-autocomplete-wrapper">
    <input
        type="text"
        id="{{ field_id }}"
        class="address-autocomplete-input {{ css_class }}"
        placeholder="{{ placeholder }}"
        data-address-autocomplete
        data-options='{{ options|safe }}'
    >
</div>
{% endif %}
