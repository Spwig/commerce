{% load static i18n element_tags merchant_trans %}
{% mtrans "Image" as default_image_alt %}
<!-- Image Element v2.1.0 -->
{% if element.content.src %}
<figure class="pb-image{% if element.content.align == 'center' %} text-center{% elif element.content.align == 'right' %} text-right{% endif %}{% if element.content.custom_class %} {{ element.content.custom_class }}{% endif %} {% entrance_animation_class element %}"
{% if element.content.id %}id="{{ element.content.id }}"{% endif %}
{% hover_animation_attrs element %}
{% entrance_animation_attrs element %}
style="{% entrance_animation_styles element %}
    margin-bottom: var(--theme-space-4);
    {% if element.content.custom_width %}width: {{ element.content.custom_width }};
    {% elif element.content.width == 'full' %}width: 100%;
    {% elif element.content.width == '1/2' %}width: 50%;
    {% elif element.content.width == '1/3' %}width: 33.333%;
    {% elif element.content.width == '2/3' %}width: 66.666%;
    {% elif element.content.width == '1/4' %}width: 25%;
    {% elif element.content.width == '3/4' %}width: 75%;
    {% elif element.content.width == 'auto' %}width: auto;{% endif %}
    {% if element.content.custom_max_width %}max-width: {{ element.content.custom_max_width }};
    {% elif element.content.max_width == 'xs' %}max-width: 20rem;
    {% elif element.content.max_width == 'sm' %}max-width: 24rem;
    {% elif element.content.max_width == 'md' %}max-width: 28rem;
    {% elif element.content.max_width == 'lg' %}max-width: 32rem;
    {% elif element.content.max_width == 'xl' %}max-width: 36rem;
    {% elif element.content.max_width == '2xl' %}max-width: 42rem;{% endif %}
    {% base_styles element %}
">
    {# Image container for overlay positioning #}
    <div class="pb-image__container" style="
        position: relative;
        overflow: hidden;
        display: inline-block;
        width: 100%;
        {% if element.content.border %}{{ element.content.border }}{% endif %}
    ">
        {% if element.content.link_url %}
        <a href="{{ element.content.link_url }}"
           {% if element.content.link_target %}target="{{ element.content.link_target }}"{% endif %}
           {% if element.content.link_target == '_blank' %}rel="noopener noreferrer"{% endif %}
           {% if element.content.link_title %}title="{{ element.content.link_title }}"{% endif %}
           class="pb-image__link">
        {% endif %}

        <img src="{{ element.content.src }}"
             alt="{{ element.content.alt|default:default_image_alt }}"
             {% if element.content.title %}title="{{ element.content.title }}"{% endif %}
             class="pb-image__img"
             data-element-id="{{ element.id }}"
             style="
                 display: block;
                 width: 100%;
                 {% if element.content.height == 'auto' or not element.content.height %}height: auto;
                 {% elif element.content.height == '32' %}height: 8rem;
                 {% elif element.content.height == '48' %}height: 12rem;
                 {% elif element.content.height == '64' %}height: 16rem;
                 {% elif element.content.height == '80' %}height: 20rem;
                 {% elif element.content.height == '96' %}height: 24rem;
                 {% elif element.content.height == 'full' %}height: 100%;{% endif %}
                 {% if element.content.aspect_ratio %}aspect-ratio: {{ element.content.aspect_ratio }};{% endif %}
                 {% if element.content.object_fit %}object-fit: {{ element.content.object_fit }};{% endif %}
                 {% if element.content.focal_point %}object-position: {{ element.content.focal_point|focal_point_css }};
                 {% elif element.content.object_position %}object-position: {{ element.content.object_position }};{% endif %}
                 {% if element.content.shadow %}{{ element.content.shadow }}{% endif %}
                 {% if element.content.opacity and element.content.opacity != 1 %}opacity: {{ element.content.opacity }};{% endif %}
                 {# Filter Presets #}
                 {% if element.content.filter_preset == 'grayscale' %}filter: grayscale(100%);
                 {% elif element.content.filter_preset == 'sepia' %}filter: sepia(80%);
                 {% elif element.content.filter_preset == 'vintage' %}filter: sepia(40%) contrast(90%) brightness(90%);
                 {% elif element.content.filter_preset == 'high-contrast' %}filter: contrast(150%) saturate(120%);
                 {% elif element.content.filter_preset == 'soft' %}filter: brightness(105%) contrast(95%) saturate(90%);
                 {% elif element.content.filter_preset == 'dramatic' %}filter: contrast(130%) brightness(90%) saturate(110%);
                 {% elif element.content.filter_preset == 'custom' %}
                     filter: grayscale({{ element.content.filter_grayscale|default:0 }}%) brightness({{ element.content.filter_brightness|default:100 }}%) contrast({{ element.content.filter_contrast|default:100 }}%) saturate({{ element.content.filter_saturate|default:100 }}%) blur({{ element.content.filter_blur|default:0 }}px);
                 {% endif %}
             "
             loading="lazy"
        />

        {# Overlay layer #}
        {% if element.content.overlay_color %}
        <div class="pb-image__overlay" style="
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: {{ element.content.overlay_color }};
            opacity: {{ element.content.overlay_opacity|default:0.25 }};
            pointer-events: none;
            transition: opacity var(--duration-fast, 0.15s) var(--easing-default, ease);
        "></div>
        {% endif %}

        {% if element.content.link_url %}
        </a>
        {% endif %}
    </div>

    {% if is_visual_builder %}
    {# Always render caption in visual builder for live preview toggling #}
    <figcaption class="pb-image__caption" {% if not element.content.show_caption %}style="display: none;"{% endif %}>
        {{ element.content.caption|default:"" }}
    </figcaption>
    {% elif element.content.show_caption and element.content.caption %}
    <figcaption class="pb-image__caption">
        {{ element.content.caption }}
    </figcaption>
    {% endif %}
</figure>
{% else %}
<!-- Default placeholder when no image is provided -->
<figure class="pb-image pb-image--placeholder">
    <div class="pb-image__placeholder-icon">
        <i class="fa fa-image" aria-hidden="true"></i>
    </div>
    <p class="pb-image__placeholder-text">
        {% mtrans "Click to add an image" %}
    </p>
</figure>
{% endif %}

{# Responsive focal point CSS for breakpoint-specific positions #}
{% focal_point_responsive_css element %}
