<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Test</title>
    <link rel="stylesheet" href="/static/core/frontend/animations.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .test-element {
            width: 400px;
            height: 200px;
            margin: 20px auto;
            padding: 20px;
            background: #f0f0f0;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .controls {
            margin: 20px auto;
            max-width: 600px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        button, select {
            margin: 5px;
            padding: 8px 15px;
            font-size: 14px;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Animation Test</h1>

    <div class="test-element" id="testElement">
        Test Element
    </div>

    <div class="controls">
        <h3>Animation Controls</h3>

        <div>
            <label>Animation Type:</label>
            <select id="animationType">
                <option value="">None</option>
                <option value="fadeIn">Fade In</option>
                <option value="slideInUp">Slide In Up</option>
                <option value="slideInDown">Slide In Down</option>
                <option value="slideInLeft">Slide In Left</option>
                <option value="slideInRight">Slide In Right</option>
                <option value="zoomIn">Zoom In</option>
                <option value="bounceIn">Bounce In</option>
                <option value="pulse">Pulse</option>
                <option value="shake">Shake</option>
                <option value="bounce">Bounce</option>
                <option value="flash">Flash</option>
                <option value="spin">Spin</option>
            </select>
        </div>

        <div>
            <label>Duration:</label>
            <select id="animationDuration">
                <option value="0.3s">Fast (0.3s)</option>
                <option value="0.5s" selected>Normal (0.5s)</option>
                <option value="1s">Slow (1s)</option>
                <option value="1.5s">Very Slow (1.5s)</option>
            </select>
        </div>

        <div>
            <label>Delay:</label>
            <select id="animationDelay">
                <option value="0s" selected>None</option>
                <option value="0.2s">0.2s</option>
                <option value="0.5s">0.5s</option>
                <option value="1s">1s</option>
            </select>
        </div>

        <div>
            <label>Timing:</label>
            <select id="animationTiming">
                <option value="ease" selected>Ease</option>
                <option value="ease-in">Ease In</option>
                <option value="ease-out">Ease Out</option>
                <option value="ease-in-out">Ease In Out</option>
                <option value="linear">Linear</option>
            </select>
        </div>

        <div>
            <label>Repeat:</label>
            <select id="animationRepeat">
                <option value="1" selected>Once</option>
                <option value="infinite">Infinite</option>
            </select>
        </div>

        <button onclick="applyAnimation()">Apply Animation</button>
        <button onclick="resetAnimation()">Reset</button>

        <div class="status" id="status">Ready to test...</div>
    </div>

    <script>
        function applyAnimation() {
            const element = document.getElementById('testElement');
            const type = document.getElementById('animationType').value;
            const duration = document.getElementById('animationDuration').value;
            const delay = document.getElementById('animationDelay').value;
            const timing = document.getElementById('animationTiming').value;
            const repeat = document.getElementById('animationRepeat').value;

            // Remove all animation classes
            const animationClasses = [
                'animate-fadeIn', 'animate-slideInUp', 'animate-slideInDown',
                'animate-slideInLeft', 'animate-slideInRight', 'animate-zoomIn',
                'animate-bounceIn', 'animate-fadeOut', 'animate-slideOutUp',
                'animate-slideOutDown', 'animate-slideOutLeft', 'animate-slideOutRight',
                'animate-zoomOut', 'animate-pulse', 'animate-shake',
                'animate-bounce', 'animate-flash', 'animate-spin'
            ];
            animationClasses.forEach(cls => element.classList.remove(cls));

            if (type) {
                // Add animation class
                element.classList.add(`animate-${type}`);

                // Apply inline styles
                element.style.animationDuration = duration;
                element.style.animationDelay = delay;
                element.style.animationTimingFunction = timing;
                element.style.animationIterationCount = repeat;
                element.style.animationFillMode = 'both';

                // Force reflow to restart animation
                void element.offsetWidth;

                document.getElementById('status').textContent =
                    `Applied: ${type} (${duration}, ${delay} delay, ${timing}, repeat: ${repeat})`;
            } else {
                // Clear animation styles
                element.style.animationDuration = '';
                element.style.animationDelay = '';
                element.style.animationTimingFunction = '';
                element.style.animationIterationCount = '';
                element.style.animationFillMode = '';

                document.getElementById('status').textContent = 'Animation cleared';
            }
        }

        function resetAnimation() {
            const element = document.getElementById('testElement');

            // Remove all animation classes
            const animationClasses = [
                'animate-fadeIn', 'animate-slideInUp', 'animate-slideInDown',
                'animate-slideInLeft', 'animate-slideInRight', 'animate-zoomIn',
                'animate-bounceIn', 'animate-fadeOut', 'animate-slideOutUp',
                'animate-slideOutDown', 'animate-slideOutLeft', 'animate-slideOutRight',
                'animate-zoomOut', 'animate-pulse', 'animate-shake',
                'animate-bounce', 'animate-flash', 'animate-spin'
            ];
            animationClasses.forEach(cls => element.classList.remove(cls));

            // Clear all animation styles
            element.style.animation = '';
            element.style.animationDuration = '';
            element.style.animationDelay = '';
            element.style.animationTimingFunction = '';
            element.style.animationIterationCount = '';
            element.style.animationFillMode = '';

            // Reset selects
            document.getElementById('animationType').value = '';
            document.getElementById('animationDuration').value = '0.5s';
            document.getElementById('animationDelay').value = '0s';
            document.getElementById('animationTiming').value = 'ease';
            document.getElementById('animationRepeat').value = '1';

            document.getElementById('status').textContent = 'Reset complete';
        }
    </script>
</body>
</html>
