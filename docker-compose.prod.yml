# =============================================================================
# REFERENCE ONLY - This file is for local/manual deployments.
# The canonical production docker-compose.yml is generated by the installer
# via deploy/scripts/lib/config.sh during installation.
# =============================================================================
name: spwig-prod

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: spwig_prod_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spwig_prod
      POSTGRES_USER: spwig_prod
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - prod_pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spwig_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spwig_prod_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - prod_redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p2
    container_name: spwig_prod_pgbouncer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: spwig_prod_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - prod_minio_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  web:
    image: registry.spwig.com/shop:latest
    container_name: spwig_prod_shop
    restart: unless-stopped
    env_file: .env
    environment:
      - CONTAINER_PREFIX=spwig_prod
      - PGBOUNCER_HOST=pgbouncer
      - PGBOUNCER_PORT=6432
      - DB_NAME_BG=spwig_prod_bg
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - prod_media:/app/media
      - prod_components:/app/components_data
      - prod_hotfixes:/app/hotfixes
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For log viewer
    networks:
      - frontend  # Receives requests from nginx
      - backend   # Accesses db, redis, minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    image: registry.spwig.com/shop:latest
    container_name: spwig_prod_celery
    restart: unless-stopped
    command: celery -A core worker -l INFO -c 4
    env_file: .env
    environment:
      - CONTAINER_PREFIX=spwig_prod
      - PGBOUNCER_HOST=pgbouncer
      - PGBOUNCER_PORT=6432
      - DB_NAME_BG=spwig_prod_bg
    volumes:
      - prod_components:/app/components_data
      - prod_hotfixes:/app/hotfixes
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For log collection task
    depends_on:
      - web
      - redis
    networks:
      - backend
    healthcheck:
      test: ["CMD", "celery", "-A", "core", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3

  celery_beat:
    image: registry.spwig.com/shop:latest
    container_name: spwig_prod_celery_beat
    restart: unless-stopped
    command: celery -A core beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler --pidfile=/tmp/celerybeat.pid
    env_file: .env
    environment:
      - CONTAINER_PREFIX=spwig_prod
      - PGBOUNCER_HOST=pgbouncer
      - PGBOUNCER_PORT=6432
      - DB_NAME_BG=spwig_prod_bg
    volumes:
      - prod_components:/app/components_data
      - prod_hotfixes:/app/hotfixes
    depends_on:
      - celery
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - backend

  translator:
    image: registry.spwig.com/translator:latest
    container_name: spwig_prod_translator
    restart: unless-stopped
    environment:
      - DEVICE=cpu
      - COMPUTE_TYPE=int8
    volumes:
      - prod_translator_models:/models
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: fholzer/nginx-brotli:v1.27.3
    container_name: spwig_prod_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - prod_media:/media:ro
    ports:
      - "127.0.0.1:8445:80"
    depends_on:
      - web
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  upgrader:
    image: registry.spwig.com/spwig/upgrader:${UPGRADER_VERSION:-latest}
    container_name: spwig_prod_upgrader
    restart: unless-stopped
    environment:
      - CONTAINER_PREFIX=spwig_prod
      - COMPOSE_PROJECT_NAME=spwig-prod
      - INSTALL_DIR=/opt/spwig
      - COMPOSE_FILE=/config/docker-compose.yml
      - ENV_FILE=/config/.env
      - BACKUPS_DIR=/backups
      - POSTGRES_USER=spwig_prod
      - POSTGRES_DB=spwig_prod
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - UPDATE_SERVER_URL=${UPDATE_SERVER_URL:-https://updates.spwig.com}
      - REGISTRY_URL=${REGISTRY_URL:-registry.spwig.com}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DOCKER_CONFIG_DIR:-${HOME}/.docker}:/root/.docker:ro  # Registry credentials
      - ./docker-compose.prod.yml:/config/docker-compose.yml:ro
      - ./.env:/config/.env
      - prod_backups:/backups
      - prod_hotfixes:/app/hotfixes
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  prod_pgdata:
  prod_redis_data:
  prod_minio_data:
  prod_media:
  prod_components:
  prod_hotfixes:
  prod_translator_models:
  prod_backups:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # No external internet access for backend services
