version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-shop_db}
      POSTGRES_USER: ${DB_USER:-shop_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-shop_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DOMAIN: ${MINIO_DOMAIN:-minio}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  # MinIO Client - Creates buckets on startup (profiles: setup excludes from default service list)
  minio_setup:
    profiles:
      - setup
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set spwigminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb spwigminio/digital-assets --ignore-existing;
      mc anonymous set download spwigminio/digital-assets;
      mc mb spwigminio/media --ignore-existing;
      mc anonymous set download spwigminio/media;
      echo 'MinIO buckets created successfully';
      exit 0;
      "

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./media:/app/media
      - static_volume:/app/static
      - components_data:/app/components_data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For log viewer
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-shop_db}
      DB_USER: ${DB_USER:-shop_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Spwig Platform
      SPWIG_SECRET_KEY: ${SPWIG_SECRET_KEY:-changeme-in-production}
      SPWIG_DEBUG: ${SPWIG_DEBUG:-False}
      SPWIG_ALLOWED_HOSTS: ${SPWIG_ALLOWED_HOSTS:-localhost,127.0.0.1}

      # Translator
      TRANSLATOR_URL: http://translator:8088
      TRANSLATOR_ENABLED: ${TRANSLATOR_ENABLED:-true}
      TRANSLATOR_API_KEY: ${TRANSLATOR_API_KEY:-}

      # MinIO (S3-compatible object storage)
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_DIGITAL_ASSETS_BUCKET: ${MINIO_DIGITAL_ASSETS_BUCKET:-digital-assets}
      MINIO_MEDIA_BUCKET: ${MINIO_MEDIA_BUCKET:-media}

      # Admin superuser (optional, for initial setup)
      SPWIG_ADMIN_USERNAME: ${SPWIG_ADMIN_USERNAME:-}
      SPWIG_ADMIN_EMAIL: ${SPWIG_ADMIN_EMAIL:-}
      SPWIG_ADMIN_PASSWORD: ${SPWIG_ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      # translator: optional AI-translation microservice.
      # Enable via `docker compose --profile ai up`. Without it, admin
      # translation UI degrades gracefully — merchant content stays
      # untranslated until a translator is reachable.

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A core worker --loglevel=info --concurrency=4
    volumes:
      - ./media:/app/media
      - components_data:/app/components_data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For log collection task
    environment:
      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-shop_db}
      DB_USER: ${DB_USER:-shop_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Spwig Platform
      SPWIG_SECRET_KEY: ${SPWIG_SECRET_KEY:-changeme-in-production}
      SPWIG_DEBUG: ${SPWIG_DEBUG:-False}

      # Translator
      TRANSLATOR_URL: http://translator:8088
      TRANSLATOR_ENABLED: ${TRANSLATOR_ENABLED:-true}
      TRANSLATOR_API_KEY: ${TRANSLATOR_API_KEY:-}

      # MinIO (S3-compatible object storage)
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_DIGITAL_ASSETS_BUCKET: ${MINIO_DIGITAL_ASSETS_BUCKET:-digital-assets}
      MINIO_MEDIA_BUCKET: ${MINIO_MEDIA_BUCKET:-media}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      # translator: optional AI-translation microservice.
      # Enable via `docker compose --profile ai up`. Without it, admin
      # translation UI degrades gracefully — merchant content stays
      # untranslated until a translator is reachable.

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A core beat --loglevel=info
    volumes:
      - ./media:/app/media
      - components_data:/app/components_data
    environment:
      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-shop_db}
      DB_USER: ${DB_USER:-shop_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Spwig Platform
      SPWIG_SECRET_KEY: ${SPWIG_SECRET_KEY:-changeme-in-production}
      SPWIG_DEBUG: ${SPWIG_DEBUG:-False}

      # MinIO (S3-compatible object storage)
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_DIGITAL_ASSETS_BUCKET: ${MINIO_DIGITAL_ASSETS_BUCKET:-digital-assets}
      MINIO_MEDIA_BUCKET: ${MINIO_MEDIA_BUCKET:-media}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Optional AI-translation microservice. Enable with:
  #   docker compose --profile ai up -d
  #
  # The image is published on the Spwig marketplace registry
  # (`registry.spwig.com/translator`). Anyone can pull it — no paid
  # account required for the pull itself. Merchants on the paid tier
  # get it pre-configured via the installer; source-form installs can
  # opt in with the profile above, or run their own translation
  # backend and point Django at it via TRANSLATOR_URL.
  translator:
    profiles: ["ai"]
    image: ${REGISTRY_URL:-registry.spwig.com}/translator:${TRANSLATOR_VERSION:-latest}
    restart: unless-stopped
    volumes:
      - translator_models:/models
      - huggingface_cache:/root/.cache/huggingface
    environment:
      CT2_MODEL_DIR: /models
      ALLOWED_LANGS: "en,es,fr,de,pt,zh,ja"
      NUM_THREADS: ${TRANSLATOR_THREADS:-4}
      INTRA_THREADS: ${TRANSLATOR_INTRA_THREADS:-0}
      COMPUTE_TYPE: ${TRANSLATOR_COMPUTE_TYPE:-int8}
      BEAM_SIZE: ${TRANSLATOR_BEAM_SIZE:-3}
      CACHE_SIZE: ${TRANSLATOR_CACHE_SIZE:-1000}
      TRANSLATOR_API_KEY: ${TRANSLATOR_API_KEY:-}
    ports:
      - "${TRANSLATOR_PORT:-8088}:8088"
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/health"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - default

  nginx:
    image: fholzer/nginx-brotli:v1.27.3
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
      - ./media:/media:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - web

  # Optional platform auto-upgrader. Enable with:
  #   docker compose --profile upgrader up -d
  #
  # ⚠ Only for INSTALLER-BASED installs. If you cloned Spwig/commerce
  # and are building your own images, do NOT enable this profile —
  # the upgrader replaces containers with signed images from
  # registry.spwig.com and will overwrite anything you've built
  # locally. Upgrade a source-form install with:
  #   git pull && docker compose build && docker compose up -d
  #
  # Merchants who installed via https://github.com/Spwig/spwig get
  # this wired up automatically and can safely run the profile.
  upgrader:
    profiles: ["upgrader"]
    image: ${REGISTRY_URL:-registry.spwig.com}/spwig/upgrader:${UPGRADER_VERSION:-latest}
    restart: unless-stopped
    environment:
      - CONTAINER_PREFIX=shop
      - COMPOSE_PROJECT_NAME=shop
      - INSTALL_DIR=/opt/spwig
      - COMPOSE_FILE=/config/docker-compose.yml
      - ENV_FILE=/config/.env
      - BACKUPS_DIR=/backups
      - POSTGRES_USER=${DB_USER:-shop_user}
      - POSTGRES_DB=${DB_NAME:-shop_db}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - UPDATE_SERVER_URL=${UPDATE_SERVER_URL:-https://updates.spwig.com}
      - REGISTRY_URL=${REGISTRY_URL:-registry.spwig.com}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DOCKER_CONFIG_DIR:-${HOME}/.docker}:/root/.docker:ro  # Registry credentials
      - ./docker-compose.yml:/config/docker-compose.yml:ro
      - ./.env:/config/.env
      - backups:/backups
    ports:
      - "${UPGRADER_PORT:-8079}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
    name: shop_pgdata
  redis_data:
    name: shop_redis_data
  minio_data:
    name: shop_minio_data
  static_volume:
    name: shop_static
  components_data:
    name: shop_components_data
  translator_models:
    name: shop_translator_models
  huggingface_cache:
    name: shop_huggingface_cache
  backups:
    name: shop_backups

networks:
  default:
    name: shop_network