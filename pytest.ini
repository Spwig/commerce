[pytest]
DJANGO_SETTINGS_MODULE = core.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts =
    --strict-markers
    -p no:warnings
    --tb=short
    --reuse-db
    -m "not e2e"
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end browser tests
    contract: marks API contract validation tests
    integrity: marks component integrity tests (migrations, themes, config, RBAC)
    checkout: marks checkout-related tests
    pos: marks POS (point of sale) related tests
    tax: marks tax management related tests
    fulfillment: marks fulfillment/warehouse allocation tests
    shipping: marks shipping-related tests
    custom_fields: marks custom fields related tests
    product_display: marks product display E2E tests
    purchase_flow: marks full purchase flow E2E tests
    admin: marks admin backend E2E tests
    messages: marks customer messages related tests
    preferences_views: marks communication preferences view tests
    guest_account: marks guest-to-account conversion tests
    configurator_3d: marks 3D configurator related tests
    core: marks core app tests (models, admin, widgets, CSP compliance)
    customers: marks customers app tests (models, admin, views, LTV, cohorts)
    email_system: marks email system app tests (models, admin, views, services, signals)
    exchange_rates: marks exchange rates app tests (models, admin, views, providers)
    semantic_search: marks semantic search tests (ONNX encoder, pgvector, help system)
    geoip: marks geoip app tests (models, admin, API views, template tags, IP utils)
    form_builder: marks form builder app tests (models, admin, API, actions, recycle bin)
    marketplace: marks marketplace checkout tests (token validation, checkout, payment status)
    providers_common: marks providers_common utility tests (translations, credential validation)
    seo_generator: marks SEO generator app tests (providers, API, signals, admin, models)
    site_health: marks site health audit tests (admin, storefront, API page checks)
    voucher_gift_card: marks voucher and gift card system tests (usage tracking, combination rules, refunds)
    sales_stats: marks product sales count tracking tests (service, management command, integration)
    sandbox: marks sandbox mode tests (email/SMS guard, webhook blocking, telemetry, whitelist)
    email_migration: marks email template migration tests (send_mail → EmailSendingService)
    unit: marks pure unit tests (no DB / no external services)
    affiliate_reports: marks affiliate monthly report tests
    affiliate_preferences: marks affiliate ↔ preferences integration tests
    blog_preferences: marks blog ↔ preferences integration tests
    admin_tests: marks admin surface integration tests
    preferences_api: marks preferences REST API tests
    communication_preferences: marks communication preferences model + storage tests
    email_preferences: marks email ↔ preferences integration tests
    media_library: marks media library app tests (models, services, API)
    preference_analytics: marks preference analytics service tests
    preference_history: marks preference change history tests
    preference_service: marks preference service layer tests
    referrals_preferences: marks referrals ↔ preferences integration tests
    smart_defaults: marks smart-defaults preference tests
    sms_preferences: marks SMS ↔ preferences integration tests
    preferences: marks preference audit + related unit tests
    sms_verification: marks SMS verification service tests
