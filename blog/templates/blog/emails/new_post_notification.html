{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "New Blog Post" %}</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <h1 style="color: #333; margin: 0 0 10px 0; font-size: 24px;">{{ title }}</h1>
    </div>

    {% if post.featured_image %}
    <div style="margin-bottom: 20px;">
        <img src="{{ post.featured_image.get_display_url }}" alt="{{ title }}" style="max-width: 100%; height: auto; border-radius: 8px;">
    </div>
    {% endif %}

    <div style="margin-bottom: 20px;">
        <p style="color: #666;">{{ excerpt }}</p>
    </div>

    <div style="text-align: center; margin: 30px 0;">
        <a href="https://{{ site.domain }}{{ post.get_absolute_url }}"
           style="background: #007bff; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; display: inline-block;">
            {% trans "Read Full Post" %}
        </a>
    </div>

    <hr style="border: none; border-top: 1px solid #ddd; margin: 30px 0;">

    <div style="text-align: center; color: #999; font-size: 12px;">
        <p>
            {% trans "You received this email because you subscribed to our blog." %}
        </p>
        <p>
            <a href="{{ preferences_url }}" style="color: #007bff;">{% trans "Manage preferences" %}</a> |
            <a href="{{ unsubscribe_url }}" style="color: #007bff;">{% trans "Unsubscribe" %}</a>
        </p>
    </div>
</body>
</html>
