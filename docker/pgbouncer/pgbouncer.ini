;; ==========================================================================
;; PgBouncer Configuration for Spwig eCommerce Platform
;; ==========================================================================
;; Two pools pointing to the same physical database with different sizes:
;;   - shop_db     (high priority): Web requests, checkout, payments
;;   - shop_db_bg  (low priority):  Background tasks (metrics, logs, cleanup)
;;
;; For local development. Production config is generated by config.sh.
;; ==========================================================================

[databases]
;; High-priority pool (web requests, checkout, payments, subscriptions)
shop_db = host=db port=5432 dbname=shop_db pool_size=25

;; Low-priority pool (background tasks: metrics, logs, cleanup, analytics)
shop_db_bg = host=db port=5432 dbname=shop_db pool_size=8

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

;; Transaction pooling - compatible with Django ORM
pool_mode = transaction

;; Connection limits
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Timeouts
server_idle_timeout = 300
server_lifetime = 3600
server_connect_timeout = 15
client_login_timeout = 60
query_wait_timeout = 120

;; Logging (minimal for production)
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

;; Admin access
admin_users = shop_user
stats_users = shop_user

;; Required for psycopg2 compatibility with transaction pooling
ignore_startup_parameters = extra_float_digits,options

;; TCP keepalive
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 10
tcp_keepcnt = 3
